{% extends 'base.html' %}

{% block content %}
  <h2 class="mb-4">Ish vaqtini o‘chirish: {{ ishvaqti }}</h2>
  
  <form method="post" class="form-group">
    {% csrf_token %}
    <p>Shu ish vaqtini o‘chirishni tasdiqlaysizmi?</p>
    <button type="submit" class="btn btn-danger">Ha, o‘chirish</button>
    <a href="{% url 'ishchilar_royxati' %}" class="btn btn-secondary">Bekor qilish</a>
  </form>
{% endblock %}
