<!-- lavozimlar_royxati.html -->
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Lavozimlar ro'yxati</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Lavozimlar ro'yxati</h1>
        <a href="{% url 'lavozim_create' %}" class="btn btn-primary mb-3">Yangi lavozim qo'shish</a>
        <a href="{% url 'ishchilar_royxati' %}" class="btn btn-secondary mb-3">Orqaga</a>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Nomi</th>
                    <th>Amallar</th>
                </tr>
            </thead>
            <tbody>
                {% for lavozim in lavozimlar %}
                <tr>
                    <td>{{ lavozim.nomi }}</td>
                    <td>
                        <a href="{% url 'lavozim_update' lavozim.pk %}" class="btn btn-warning btn-sm">Yangilash</a>
                        <a href="{% url 'lavozim_delete' lavozim.pk %}" class="btn btn-danger btn-sm">O'chirish</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Bootstrap JS va dependentslarini qo'shish -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
