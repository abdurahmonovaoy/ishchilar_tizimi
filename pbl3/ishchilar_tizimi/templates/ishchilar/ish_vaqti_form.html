{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title text-center mb-4">Ish vaqtini qo‘shish</h2>
            <form method="post" class="form-group">
                {% csrf_token %}
                <!-- Ishchi tanlash -->
                <div class="form-group mb-3">
                    <label for="id_ishchi">Ishchi:</label>
                    {{ form.ishchi }}
                </div>
                
                <!-- Bugungi sana avtomatik tarzda -->
                <div class="form-group mb-3">
                    <label for="id_kun">Kun:</label>
                    {{ form.kun }}
                </div>

                <!-- Boshlanish va tugash vaqtlarini kiritish -->
                <div class="form-group mb-3">
                    <label for="id_boshlanish_vaqti">Boshlanish vaqti:</label>
                    {{ form.boshlanish_vaqti }}
                </div>
                <div class="form-group mb-3">
                    <label for="id_tugash_vaqti">Tugash vaqti:</label>
                    {{ form.tugash_vaqti }}
                </div>

                <!-- Qo'shish tugmasi -->
                <button type="submit" class="btn btn-primary">Qo‘shish</button>
                <a href="{% url 'ishchilar_royxati' %}" class="btn btn-secondary">Orqaga</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
